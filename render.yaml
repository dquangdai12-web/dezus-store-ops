services:
  - type: web
    name: dezus-store-ops
    env: node
    plan: starter
    buildCommand: npm install --no-audit --no-fund --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_ROOT
        value: /opt/render/project/src/storage
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: dezus-store-ops-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
